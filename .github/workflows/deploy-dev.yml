name: deploy-dev

on:
  push:
    branches: [develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finflow_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/finflow_test
      # E2e модуля заявок: демо-DWH и 1С без сети (см. .env.example)
      DWH_MODE: fixture
      ONEC_API_MODE: mock
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    concurrency: deploy-dev
    steps:
      - name: Deploy to dev
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh deploy@${{ secrets.SERVER_HOST }} 'bash -s' <<'EOF'
          set -e
          cd /var/www/finflow-dev
          git fetch origin develop
          git reset --hard origin/develop
          npm ci
          npx prisma migrate deploy
          npm run build
          export PM2_HOME=/home/deploy/.pm2
          pm2 reload finflow-dev --update-env
          sleep 3
          curl -sf -o /dev/null http://127.0.0.1:3001/transactions
          echo "dev deploy OK: $(git rev-parse --short HEAD)"
          EOF
